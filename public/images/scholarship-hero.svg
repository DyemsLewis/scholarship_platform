<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="400" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="500" height="400" fill="transparent"/>
    <!-- Student character -->
    <circle cx="250" cy="180" r="60" fill="#64B5F6"/>
    <circle cx="250" cy="180" r="50" fill="#E3F2FD"/>
    
    <!-- Graduation cap -->
    <path d="M230 140 L270 140 L280 150 L220 150 Z" fill="#1A237E"/>
    <rect x="240" y="130" width="20" height="10" fill="#1A237E"/>
    
    <!-- Magnifying glass -->
    <circle cx="350" cy="220" r="40" fill="none" stroke="#4CAF50" stroke-width="8"/>
    <line x1="380" y1="250" x2="420" y2="290" stroke="#4CAF50" stroke-width="8"/>
    
    <!-- Scholarship documents -->
    <rect x="180" y="250" width="140" height="100" rx="5" fill="#FFF3E0"/>
    <rect x="190" y="260" width="120" height="20" rx="3" fill="#FFB74D"/>
    <rect x="190" y="290" width="120" height="5" rx="2" fill="#FFCC80"/>
    <rect x="190" y="305" width="80" height="5" rx="2" fill="#FFCC80"/>
    <rect x="190" y="320" width="100" height="5" rx="2" fill="#FFCC80"/>
    
    <!-- Check marks -->
    <circle cx="130" cy="220" r="20" fill="#4CAF50"/>
    <path d="M120 225 L135 240 L150 210" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Stars for achievement -->
    <path d="M100 120 L105 135 L120 135 L110 145 L115 160 L100 150 L85 160 L90 145 L80 135 L95 135 Z" fill="#FFD700"/>
    <path d="M400 120 L405 135 L420 135 L410 145 L415 160 L400 150 L385 160 L390 145 L380 135 L395 135 Z" fill="#FFD700"/>
    
    <!-- Data flow lines -->
    <path d="M250 240 Q300 220 350 220" stroke="#64B5F6" stroke-width="3" stroke-dasharray="5,5" fill="none"/>
    <path d="M130 220 Q200 200 250 180" stroke="#4CAF50" stroke-width="3" stroke-dasharray="5,5" fill="none"/>
</svg>