<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="400" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="500" height="400" fill="transparent"/>
    
    <!-- Wavy path -->
    <path d="M50 200 Q150 150 250 200 Q350 250 450 200" stroke="#64B5F6" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Start point - School -->
    <circle cx="50" cy="200" r="25" fill="#2196F3"/>
    <rect x="35" y="185" width="30" height="30" rx="3" fill="white"/>
    <text x="50" y="205" text-anchor="middle" fill="#2196F3" font-weight="bold" font-size="14">🏫</text>
    <text x="50" y="240" text-anchor="middle" fill="#1A237E" font-size="12" font-weight="500">School</text>
    
    <!-- Middle point - College -->
    <circle cx="250" cy="200" r="25" fill="#4CAF50"/>
    <rect x="235" y="185" width="30" height="30" rx="3" fill="white"/>
    <text x="250" y="205" text-anchor="middle" fill="#4CAF50" font-weight="bold" font-size="14">🎓</text>
    <text x="250" y="240" text-anchor="middle" fill="#1A237E" font-size="12" font-weight="500">College</text>
    
    <!-- End point - Career -->
    <circle cx="450" cy="200" r="25" fill="#FF9800"/>
    <rect x="435" y="185" width="30" height="30" rx="3" fill="white"/>
    <text x="450" y="205" text-anchor="middle" fill="#FF9800" font-weight="bold" font-size="14">💼</text>
    <text x="450" y="240" text-anchor="middle" fill="#1A237E" font-size="12" font-weight="500">Career</text>
    
    <!-- Student walking -->
    <circle cx="150" cy="180" r="15" fill="#64B5F6"/>
    <path d="M150 195 L150 210" stroke="#64B5F6" stroke-width="3"/>
    <path d="M145 210 L150 200 L155 210" stroke="#64B5F6" stroke-width="3"/>
    <path d="M145 195 L150 185 L155 195" stroke="#64B5F6" stroke-width="3"/>
    
    <!-- Books icon -->
    <rect x="80" y="280" width="60" height="80" rx="5" fill="#795548"/>
    <rect x="85" y="285" width="50" height="70" rx="3" fill="#D7CCC8"/>
    <line x1="85" y1="300" x2="135" y2="300" stroke="#795548" stroke-width="2"/>
    <line x1="85" y1="320" x2="135" y2="320" stroke="#795548" stroke-width="2"/>
    
    <!-- Graduation cap -->
    <path d="M370 280 L430 280 L440 290 L360 290 Z" fill="#1A237E"/>
    <rect x="380" y="270" width="40" height="10" fill="#1A237E"/>
    
    <!-- Money bag icon -->
    <circle cx="200" cy="320" r="30" fill="#4CAF50"/>
    <path d="M185 320 Q200 340 215 320" stroke="#388E3C" stroke-width="4" fill="none"/>
    <text x="200" y="325" text-anchor="middle" fill="white" font-size="20" font-weight="bold">₱</text>
    
    <!-- Arrow markers on path -->
    <path d="M200 195 L210 185 L220 195" fill="#64B5F6"/>
    <path d="M300 205 L310 195 L320 205" fill="#64B5F6"/>
    <path d="M400 195 L410 185 L420 195" fill="#64B5F6"/>
    
    <!-- Percentage indicators -->
    <text x="100" y="150" text-anchor="middle" fill="#2196F3" font-size="16" font-weight="bold">100%</text>
    <text x="300" y="150" text-anchor="middle" fill="#4CAF50" font-size="16" font-weight="bold">75%</text>
    <text x="450" y="150" text-anchor="middle" fill="#FF9800" font-size="16" font-weight="bold">95%</text>
</svg>