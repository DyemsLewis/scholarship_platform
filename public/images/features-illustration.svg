<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="400" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="500" height="400" fill="transparent"/>
    
    <!-- Central processing unit -->
    <rect x="200" y="150" width="100" height="100" rx="10" fill="#E8EAF6"/>
    <rect x="210" y="160" width="80" height="80" rx="5" fill="#3F51B5"/>
    
    <!-- Circuit lines -->
    <path d="M200 200 L150 200" stroke="#3F51B5" stroke-width="3"/>
    <path d="M300 200 L350 200" stroke="#3F51B5" stroke-width="3"/>
    <path d="M250 150 L250 100" stroke="#3F51B5" stroke-width="3"/>
    <path d="M250 250 L250 300" stroke="#3F51B5" stroke-width="3"/>
    
    <!-- Input 1: Document upload -->
    <circle cx="150" cy="200" r="30" fill="#FF9800"/>
    <rect x="140" y="190" width="20" height="25" rx="3" fill="white"/>
    <line x1="145" y1="195" x2="155" y2="195" stroke="white" stroke-width="2"/>
    <line x1="145" y1="200" x2="155" y2="200" stroke="white" stroke-width="2"/>
    <line x1="145" y1="205" x2="155" y2="205" stroke="white" stroke-width="2"/>
    <text x="150" y="240" text-anchor="middle" fill="#1A237E" font-size="12" font-weight="500">Upload</text>
    
    <!-- Input 2: User profile -->
    <circle cx="350" cy="200" r="30" fill="#4CAF50"/>
    <circle cx="350" cy="195" r="10" fill="white"/>
    <path d="M340 210 L360 210" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <text x="350" y="240" text-anchor="middle" fill="#1A237E" font-size="12" font-weight="500">Profile</text>
    
    <!-- Output 1: Matched scholarships -->
    <circle cx="250" cy="100" r="30" fill="#9C27B0"/>
    <path d="M240 105 L250 115 L260 100" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="250" y="140" text-anchor="middle" fill="#1A237E" font-size="12" font-weight="500">Match</text>
    
    <!-- Output 2: Application -->
    <circle cx="250" cy="300" r="30" fill="#00BCD4"/>
    <path d="M240 290 L250 310 L260 290" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="250" y="340" text-anchor="middle" fill="#1A237E" font-size="12" font-weight="500">Apply</text>
    
    <!-- Processing animation circles -->
    <circle cx="250" cy="200" r="40" fill="none" stroke="#3F51B5" stroke-width="2" stroke-dasharray="5,5">
        <animateTransform attributeName="transform" type="rotate" from="0 250 200" to="360 250 200" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- AI brain icon inside CPU -->
    <path d="M220 180 Q240 170 260 180 Q280 190 260 200 Q240 210 220 200 Q200 190 220 180" fill="white" fill-opacity="0.8"/>
    <path d="M230 185 Q240 180 250 185 Q260 190 250 195 Q240 200 230 195 Q220 190 230 185" fill="#3F51B5"/>
    
    <!-- Sparkles for processing -->
    <path d="M270 170 L275 165 L280 170 L275 175 Z" fill="#FFD700">
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M230 230 L235 225 L240 230 L235 235 Z" fill="#FFD700">
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </path>
</svg>